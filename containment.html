<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Containment Calculation</title>
    <link rel="icon" href="assets/smallLogo.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/containment.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="container containment-container">
    
    <h1 class="header">Containment Calculation</h1>

    <div class="form-group">
        <label for="speedInput">Maximum speed of the UA</label>
        <div class="flex-row">
            <input type="number" id="speedInput" placeholder="Enter speed" value="20" style="width: 110px; text-align: right;" />
            <select id="speedUnit" style="width: 70px;">
                <option value="m/s">m/s</option>
                <option value="km/h">km/h</option>
                <option value="kt">kt</option>
            </select>
        </div>
    </div>
    <div class="form-group adjacent-area-box">
        <div><strong style="font-size: 1.2em;">Adjacent area:</strong> <span id="adjacentArea" style="font-weight: bold; font-size: 1.2em;">-</span></div>
        <div style="margin-top: 10px; font-size: 0.8em;">
            The lateral outer limit of the adjacent area is calculated from the operational volume as the distance flown in 3 minutes at maximum speed of the UA. It is never less than 5 km or more than 35 km. See SORA 2.5 Main Body for details.
        </div>
    </div>

    <div class="form-row">
        <div class="form-group half-width">
            <label for="uaSize">UA Size</label>
            <select id="uaSize">
                <option value="1m">&lt; 1 m UA (&lt; 25 m/s)</option>
                <option value="3mShelterApplicable">&lt; 3 m UA (&lt; 35 m/s) - Shelter applicable in the adjacent area</option>
                <option value="3mShelterNotApplicable">&lt; 3 m UA (&lt; 35 m/s) - Shelter not applicable in the adjacent area</option>
                <option value="8m">&lt; 8 m UA (&lt; 75 m/s)</option>
                <option value="20m">&lt; 20 m UA (&lt; 125 m/s)</option>
                <option value="40m">&lt; 40 m UA (&lt; 200 m/s)</option>
            </select>
        </div>
        <div class="form-group half-width">
            <label for="sail">SAIL</label>
            <select id="sail">
                <option value="I">I</option>
                <option value="II" selected>II</option>
                <option value="III">III</option>
                <option value="IV">IV</option>
                <option value="V">V</option>
                <option value="VI">VI</option>
            </select>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group half-width">
            <label for="populationDensity">Average population density allowed in the adjacent area</label>
            <select id="populationDensity">
            </select>
        </div>
        <div class="form-group half-width">
            <label for="outdoorAssemblies">Outdoor assemblies allowed within 1 km of the OPS volume</label>
            <select id="outdoorAssemblies">
                <option value="40k">&lt; 40 k</option>
                <option value="40kTo400k">40 k to 400 k</option>
                <option value="400k">&gt; 400 k</option>
            </select>
        </div>
    </div>
    <div id="result" class="result"></div>

    <div class="button-bar">
        <button type="button" id="resetContainmentForm" class="reset-button">
            <svg class="reset-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"></path>
            </svg>
            <span>Reset form</span>
        </button>
    </div>
    </div>

<script src="js/containment.js"></script>
<script src="js/navbar.js"></script>

</body>
</html>
